name: Refresh events cache

on:
  schedule:
    # Run every 4 hours to keep events fresh
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --deploy

      - name: Fetch and cache events
        env:
          ACTION_NETWORK_API_KEY: ${{ secrets.ACTION_NETWORK_API_KEY }}
        run: pipenv run python scripts/cache_events.py

      - name: Commit cache if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/events_cache.json
          if git diff --staged --quiet; then
            echo "Events cache unchanged — nothing to commit"
          else
            git commit -m "chore: refresh events cache"
            git push
          fi
